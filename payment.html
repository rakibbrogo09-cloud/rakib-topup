<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    padding:15px;
    color:white;
}

.box{
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:18px;
    margin-bottom:15px;
}

.amount{
    font-size:26px;
    text-align:center;
    color:#00eaff;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    margin-top:10px;
}

.verify-btn{
    width:100%;
    padding:15px;
    background:#00eaff;
    border:none;
    border-radius:15px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>💳 Payment</h2>
</div>

<div class="box amount">
Amount: <span id="amount">0</span>৳
</div>

<div class="box">
<input type="text" id="trx" placeholder="Transaction ID">
<button class="verify-btn" onclick="submitPayment()">VERIFY</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, addDoc, collection }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDle4ZxvdXBXsgaYzD-XHI__Y_QheGuC68",
  authDomain: "rakib-top-5.firebaseapp.com",
  projectId: "rakib-top-5",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore(app);

// 🔥 login check
onAuthStateChanged(auth, (user) => {
    if(!user){
        window.location.href = "login.html";
    }
});

// 🔥 show amount
let amount = localStorage.getItem("amount") || 0;
document.getElementById("amount").innerText = amount;

// 🔥 submit
window.submitPayment = async function(){

    let trx = document.getElementById("trx").value;
    let uid = localStorage.getItem("uid");

    if(!trx){
        alert("Transaction ID দিন");
        return;
    }

    let user = auth.currentUser;

    if(!user){
        alert("Login first");
        return;
    }

    let order = {
        uid: uid,
        amount: parseInt(amount),
        trx: trx,
        user: user.email,
        status: "pending",
        time: new Date().toLocaleString()
    };

    await addDoc(collection(db, "orders"), order);

    alert("✅ Payment Submitted");

    localStorage.removeItem("uid");
    localStorage.removeItem("amount");

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
