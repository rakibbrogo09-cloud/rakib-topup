<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 0 10px #007bff;}
button{padding:8px 12px;border:none;border-radius:6px;margin-top:10px;}
.approve{background:green;color:white;}
.reject{background:red;color:white;}
</style>
</head>

<body>

<h2>🔥 Admin Panel</h2>
<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "rakib-top-5.firebaseapp.com",
  projectId: "rakib-top-5",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ordersDiv = document.getElementById("orders");

async function loadOrders(){
    const querySnapshot = await getDocs(collection(db, "orders"));

    querySnapshot.forEach((docSnap) => {
        let data = docSnap.data();

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <p>${data.user}</p>
        <p>${data.uid}</p>
        <p>${data.pack}</p>
        <p>${data.trx}</p>
        <p>Status: ${data.status}</p>

        <button class="approve" onclick="approveOrder('${docSnap.id}')">Approve</button>
        <button class="reject" onclick="rejectOrder('${docSnap.id}')">Reject</button>
        `;

        ordersDiv.appendChild(div);
    });
}

window.approveOrder = async function(id){

    const ref = doc(db, "orders", id);
    const snap = await getDoc(ref);
    const data = snap.data();

    await updateDoc(ref, { status: "approved" });

    const userRef = doc(db, "users", data.user);

    await setDoc(userRef, {
        balance: (parseInt(data.pack) || 0)
    }, { merge: true });

    alert("✅ Approved + Balance Added");
    location.reload();
}

window.rejectOrder = async function(id){
    await updateDoc(doc(db, "orders", id), { status: "rejected" });
    alert("❌ Rejected");
    location.reload();
}

loadOrders();
</script>

</body>
</html>
