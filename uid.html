<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#f1f5f9;
    padding:15px;
}

.box{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 0 10px #ddd;
}

.title{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.title img{
    width:40px;
    border-radius:50%;
}

.amount{
    font-size:22px;
    font-weight:bold;
    color:#333;
}

.step{
    margin:10px 0;
    border-bottom:1px solid #eee;
    padding-bottom:10px;
}

.copy-btn{
    background:#007bff;
    color:white;
    padding:5px 10px;
    border:none;
    border-radius:6px;
    margin-left:10px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-top:10px;
}

.verify-btn{
    width:100%;
    padding:15px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box title">
    <img src="logo.png">
    <div>RAKIB TOPUP</div>
</div>

<div class="box amount">
    💰 Amount: <span id="amount">0</span> BDT
</div>

<div class="box">

<div class="step">🔹 আপনার Nagad App এ যান</div>

<div class="step">🔹 Send Money এ ক্লিক করুন</div>

<div class="step">
🔹 নাম্বার দিন: <b id="number">018XXXXXXXX</b>
<button class="copy-btn" onclick="copyNumber()">Copy</button>
</div>

<div class="step">
🔹 Amount: <b id="showAmount">0</b> BDT
<button class="copy-btn" onclick="copyAmount()">Copy</button>
</div>

<div class="step">🔹 PIN দিয়ে payment complete করুন</div>

<div class="step">🔹 নিচে Transaction ID দিন</div>

<input type="text" id="trx" placeholder="Enter Transaction ID">

<button class="verify-btn" onclick="submitPayment()">VERIFY</button>

</div>

<script>
let amount = localStorage.getItem("payAmount") || 0;

document.getElementById("amount").innerText = amount;
document.getElementById("showAmount").innerText = amount;

function copyNumber(){
    navigator.clipboard.writeText("018XXXXXXXX");
    alert("Number copied!");
}

function copyAmount(){
    navigator.clipboard.writeText(amount);
    alert("Amount copied!");
}

function submitPayment(){
    let trx = document.getElementById("trx").value;

    if(!trx){
        alert("Transaction ID দিন");
        return;
    }

    alert("✅ Payment Submitted");
}
</script>

</body>
</html>
