<!DOCTYPE html>
<html>
<head>
<title>UID TOPUP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{background:white;padding:20px;border-radius:15px;box-shadow:0 0 10px #007bff;}
input, select{width:100%;padding:12px;margin-top:10px;border:1px solid #007bff;border-radius:8px;}
button{width:100%;padding:12px;margin-top:10px;border:none;background:#007bff;color:white;border-radius:8px;}
</style>
</head>

<body>

<div class="card">
<h2>💎 UID TOPUP</h2>

<input type="text" id="uid" placeholder="Enter UID">

<select id="pack">
<option>Select Diamond</option>
<option value="25">25 Diamond - 25৳</option>
<option value="50">50 Diamond - 45৳</option>
<option value="115">115 Diamond - 90৳</option>
<option value="240">240 Diamond - 180৳</option>
</select>

<input type="text" id="trx" placeholder="Transaction ID">

<button onclick="submitTopup()">Submit</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "rakib-top-5.firebaseapp.com",
  projectId: "rakib-top-5",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.submitTopup = async function(){

    let user = auth.currentUser;
    if(!user){
        alert("Login first");
        return;
    }

    let uid = document.getElementById("uid").value;
    let pack = document.getElementById("pack").value;
    let trx = document.getElementById("trx").value;

    if(!uid || pack==="Select Diamond" || !trx){
        alert("সব তথ্য দিন");
        return;
    }

    await addDoc(collection(db, "orders"), {
        uid, pack, trx,
        user: user.email,
        status: "pending"
    });

    alert("✅ Order Submitted");
}
</script>

</body>
</html>
