<!DOCTYPE html>
<html>
<head>
<title>UID TOPUP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px #007bff;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #007bff;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h2>💎 UID TOPUP</h2>

<input type="text" id="uid" placeholder="Enter UID">

<select id="pack">
<option>Select Diamond</option>
<option value="25">25 Diamond - 25৳</option>
<option value="45">50 Diamond - 45৳</option>
<option value="90">115 Diamond - 90৳</option>
<option value="180">240 Diamond - 180৳</option>
</select>

<input type="text" id="trx" placeholder="Enter Transaction ID">

<button onclick="submitTopup()">Submit</button>
</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, addDoc, collection }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDle4ZxvdXBXsgaYzD-XHI__Y_QheGuC68",
  authDomain: "rakib-top-5.firebaseapp.com",
  projectId: "rakib-top-5",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.submitTopup = async function(){

    let uid = document.getElementById("uid").value;
    let pack = document.getElementById("pack").value;
    let trx = document.getElementById("trx").value;

    if(!uid){
        alert("❌ UID দিন");
        return;
    }

    if(pack === "Select Diamond"){
        alert("❌ Package select করুন");
        return;
    }

    if(!trx){
        alert("❌ Transaction ID দিন");
        return;
    }

    if(!auth.currentUser){
        alert("❌ Please login first");
        return;
    }

    let order = {
        uid: uid,
        pack: pack,
        trx: trx,
        user: auth.currentUser.email,
        amount: parseInt(pack),
        status: "pending",
        time: new Date().toLocaleString()
    };

    try{
        await addDoc(collection(db, "orders"), order);
        alert("✅ Order Submitted (Firebase)");
    }catch(e){
        alert("❌ Error");
        console.log(e);
    }
}
</script>

</body>
</html>
