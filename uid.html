<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, addDoc, collection }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDle4ZxvdXBXsgaYzD-XHI__Y_QheGuC68",
  authDomain: "rakib-top-5.firebaseapp.com",
  projectId: "rakib-top-5",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 show amount
let amount = localStorage.getItem("amount") || 0;
document.getElementById("amount").innerText = amount;
document.getElementById("showAmount").innerText = amount;

// 🔥 copy
window.copyNumber = function(){
    navigator.clipboard.writeText("018XXXXXXXX");
    alert("Number copied!");
}

window.copyAmount = function(){
    navigator.clipboard.writeText(amount);
    alert("Amount copied!");
}

// 🔥 submit payment
window.submitPayment = async function(){

    let trx = document.getElementById("trx").value;
    let uid = localStorage.getItem("uid");

    if(!trx){
        alert("Transaction ID দিন");
        return;
    }

    if(!auth.currentUser){
        alert("Login first");
        return;
    }

    let order = {
        uid: uid,
        amount: parseInt(amount),
        trx: trx,
        user: auth.currentUser.email,
        status: "pending",
        time: new Date().toLocaleString()
    };

    try{
        await addDoc(collection(db, "orders"), order);
        alert("✅ Payment Submitted");

        // clear
        localStorage.removeItem("uid");
        localStorage.removeItem("amount");

        window.location.href = "dashboard.html";

    }catch(e){
        alert("❌ Error");
        console.log(e);
    }
}
</script>
