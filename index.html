<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAKIB TOPUP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f0f0f, #001f1f);
    color: white;
}

header {
    text-align: center;
    padding: 30px;
}

header img {
    width: 120px;
    border-radius: 15px;
}

h1 {
    color: #00ff99;
}

.container {
    padding: 20px;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 0 10px #00ff99;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
}

button {
    background: #00ff99;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00cc77;
}
</style>
</head>

<body>

<header>
    <img src="logo.png">
    <h1>RAKIB TOPUP</h1>
    <p>Fast & Secure Recharge Service</p>
</header>

<div class="container">

<div class="card">
<h2>📱 Mobile Topup</h2>
<input type="text" placeholder="Enter Number">
<input type="number" placeholder="Amount">
<button>Submit</button>
</div>

<div class="card">
<h2>🔐 Login</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>
</div>

<div class="card">
<h2>💳 Payment</h2>
<p>Bkash: 01XXXXXXXXX</p>
<p>Nagad: 01XXXXXXXXX</p>
</div>

</div>

</body>
</html>
