<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAKIB TOPUP</title>

<style>
.card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #007bff;
    color: white;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 40px;
    border-radius: 8px;
}

.menu {
    display: flex;
    gap: 15px;
}

.menu div {
    cursor: pointer;
}

/* CARDS */
.container {
    padding: 20px;
}

.card {
    background: white;
    border: 2px solid #007bff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 10px #007bff;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
}

/* BUTTON */
button {
    padding: 10px 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png">
        <h2>RAKIB TOPUP</h2>
    </div>

    <div class="menu">
        <div>💰 Wallet</div>
        <div onclick="window.location.href='login.html'">Login</div>
</header>

<div class="container">

<div class="card" onclick="openPage('uid')">
    <img src="uid.jpg">
    <h3>UID TOP UP [BD]</h3>
</div>

<div class="card" onclick="openPage('weekly')">
    <img src="weekly.jpg">
    <h3>WEEKLY + MONTHLY</h3>
</div>

<div class="card" onclick="openPage('level')">
    <img src="level.jpg">
    <h3>LEVEL UP PACKAGE</h3>
</div>

</div>

<script>
function login(){
    alert("Login system coming soon 😎");
}

function openPage(type){
    if(type === 'uid'){
        window.location.href = "uid.html";
    }
    if(type === 'weekly'){
        window.location.href = "weekly.html";
    }
    if(type === 'level'){
        window.location.href = "level.html";
    }
}
</script>

</body>
</html>
