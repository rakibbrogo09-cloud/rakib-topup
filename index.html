<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAKIB TOPUP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

header {
    text-align: center;
    padding: 30px;
}

header img {
    width: 130px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ff99;
}

h1 {
    color: #00ff99;
    text-shadow: 0 0 10px #00ff99;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(0,255,153,0.05);
    border: 1px solid #00ff99;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px #00ff99;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #00ff99;
    border-radius: 8px;
    background: black;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #00ff99;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px #00ff99;
}

button:hover {
    background: #00cc77;
}
</style>
</head>

<body>

<header>
    <img src="logo.png">
    <h1>RAKIB TOPUP</h1>
    <p>🔥 Fast & Secure Gaming Recharge 🔥</p>
</header>

<div class="container">

<div class="card">
<h2>📱 Topup</h2>
<input type="text" placeholder="Enter Number">
<input type="number" placeholder="Amount">
<button>Submit</button>
</div>

<div class="card">
<h2>🔐 Login</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>
</div>

<div class="card">
<h2>💳 Payment</h2>
<p>📲 Bkash: 01XXXXXXXXX</p>
<p>📲 Nagad: 01XXXXXXXXX</p>
</div>

</div>

</body>
</html>
