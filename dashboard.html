<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px #007bff;
}

button{
    padding:10px;
    margin-top:10px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
<h2>👤 Dashboard</h2>

<p id="name">Loading...</p>
<p>💰 Balance: <span id="bal">0</span>৳</p>

<h3>📦 Order History</h3>
<ul id="orders"></ul>

<button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, doc, getDoc, collection, getDocs, query, where }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDle4ZxvdXBXsgaYzD-XHI__Y_QheGuC68",
  authDomain: "rakib-top-5.firebaseapp.com",
  projectId: "rakib-top-5",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nameEl = document.getElementById("name");
const balEl = document.getElementById("bal");
const orderList = document.getElementById("orders");

// 🔥 AUTH FIXED
onAuthStateChanged(auth, async (user) => {

    if(!user){
        window.location.href = "login.html";
        return;
    }

    let email = user.email;
    nameEl.innerText = "User: " + email;

    // 🔥 Balance Load
    const userRef = doc(db, "users", email);
    const userSnap = await getDoc(userRef);

    if(userSnap.exists()){
        balEl.innerText = userSnap.data().balance || 0;
    }else{
        balEl.innerText = 0;
    }

    // 🔥 Orders Load
    const q = query(collection(db, "orders"), where("user", "==", email));
    const querySnapshot = await getDocs(q);

    orderList.innerHTML = "";

    querySnapshot.forEach((docSnap) => {
        let data = docSnap.data();

        let li = document.createElement("li");
        li.innerText = `UID: ${data.uid} | Amount: ${data.amount}৳ | Status: ${data.status}`;

        orderList.appendChild(li);
    });

});

// logout
window.logout = function(){
    signOut(auth);
    window.location.href = "login.html";
}
</script>

</body>
</html>
