<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px #007bff;
}
</style>
</head>

<body>

<div class="card">
<h2>👤 Welcome</h2>
<p id="name"></p>

<button onclick="logout()">Logout</button>
</div>

<script>
document.getElementById("name").innerText =
"User: " + localStorage.getItem("username");

function logout(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
