<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{background:white;padding:20px;border-radius:15px;box-shadow:0 0 10px #007bff;}
</style>
</head>

<body>

<div class="card">
<h2>👤 Dashboard</h2>
<p id="name"></p>
<p>💰 Balance: <span id="bal">0</span>৳</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "rakib-top-5.firebaseapp.com",
  projectId: "rakib-top-5",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
    if(user){
        document.getElementById("name").innerText = user.email;

        const ref = doc(db, "users", user.email);
        const snap = await getDoc(ref);

        if(snap.exists()){
            document.getElementById("bal").innerText = snap.data().balance;
        }
    }else{
        alert("Login first");
        window.location.href="login.html";
    }
});
</script>

</body>
</html>
